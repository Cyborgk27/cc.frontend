<div class="p-8 max-w-6xl mx-auto animate-in fade-in duration-500">
  <div class="mb-8 flex justify-between items-end">
    <div>
      <h2 class="text-3xl font-bold text-white tracking-tight">
        {{ isEditMode ? 'Editar Proyecto' : 'Nuevo Proyecto' }}
      </h2>
      <p class="text-slate-400 text-sm mt-1">Gestiona la identidad y seguridad de la instancia.</p>
    </div>
    @if (isEditMode && form.get('isActive')?.value) {
      <span
        class="px-4 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] font-bold rounded-full border border-emerald-500/20 tracking-widest uppercase"
        >Proyecto Activo</span
      >
    }
  </div>

  <div
    class="flex gap-2 p-1.5 bg-slate-900/80 backdrop-blur-md rounded-2xl border border-slate-700/50 w-fit mb-8 shadow-2xl"
  >
    <button
      type="button"
      (click)="activeTab.set('general')"
      [class]="activeTab() === 'general' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'"
      class="px-6 py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 text-sm"
    >
      <span class="material-icons text-sm">info</span> Datos Generales
    </button>
    <button
      type="button"
      (click)="activeTab.set('keys')"
      [class]="activeTab() === 'keys' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'"
      class="px-6 py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 text-sm"
    >
      <span class="material-icons text-sm">vpn_key</span> API Keys
    </button>
    <button
      type="button"
      (click)="activeTab.set('catalogs')"
      [class]="activeTab() === 'catalogs' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'"
      class="px-6 py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 text-sm"
    >
      <span class="material-icons text-sm">library_books</span> Catálogos
    </button>
  </div>

  <form [formGroup]="form" class="space-y-8">
    @if (activeTab() === 'general') {
      <div
        class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-800/20 p-8 rounded-3xl border border-slate-700/30 animate-in slide-in-from-bottom-4 duration-300"
      >
        <app-form-input
          formControlName="name"
          label="Código Técnico"
          icon="terminal"
          [error]="getErrorMessage('name')"
        ></app-form-input>
        <app-form-input
          formControlName="showName"
          label="Nombre Visual"
          icon="badge"
          [error]="getErrorMessage('showName')"
        ></app-form-input>

        <div class="md:col-span-2 space-y-2">
          <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1"
            >Descripción</label
          >
          <textarea
            formControlName="description"
            rows="3"
            class="w-full bg-slate-900/50 border border-slate-700 text-white p-4 rounded-2xl focus:border-indigo-500 outline-none transition-all resize-none"
          ></textarea>
        </div>
      </div>
    }

    @if (activeTab() === 'keys') {
      <app-project-keys
        [parentForm]="form"
        [apiKeysArray]="apiKeysArray"
        (onAdd)="addApiKey()"
        (onRemove)="removeApiKey($event)"
      >
      </app-project-keys>
    }

    @if (activeTab() === 'catalogs') {
      <app-project-catalogs
        [available]="availableCatalogs"
        [selected]="selectedCatalogs"
        (onDrop)="drop($event)"
      >
      </app-project-catalogs>
    }

    <div class="flex justify-end pt-8 border-t border-slate-800/50 gap-4">
      <button
        type="button"
        routerLink="/projects"
        class="px-8 py-3 text-slate-400 font-bold text-xs uppercase tracking-widest"
      >
        Cancelar
      </button>
      <button
        (click)="save()"
        [disabled]="projectFacade.isLoading()"
        class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-indigo-900/30 active:scale-95 flex items-center gap-3"
      >
        <span class="material-icons text-sm">{{
          projectFacade.isLoading()
            ? 'refresh'
            : isEditMode
              ? 'published_with_changes'
              : 'rocket_launch'
        }}</span>
        <span>{{
          projectFacade.isLoading()
            ? 'Guardando...'
            : isEditMode
              ? 'Guardar Cambios'
              : 'Lanzar Proyecto'
        }}</span>
      </button>
    </div>
  </form>
</div>
