<div class="p-8 bg-transparent min-h-screen animate-in fade-in slide-in-from-bottom-4 duration-700">
    

    <div class="animate-in fade-in zoom-in-95 duration-500">
        <app-generic-table
            [data]="list"
            [columns]="systemColumns"
            [pagination]="true"
            [loading]="isLoading()"
            [actions]="systemActions"
            [currentPage]="filters().page ?? 1"
            [totalItems]="totalRecords()"
            (pageChange)="onPageChange($event)">
        </app-generic-table>
    </div>

    <div class="mt-8 flex items-center gap-4 px-6 py-4 bg-slate-900/40 border border-slate-800 rounded-2xl w-fit">
        <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">
            Total de registros: {{ list.length }}
        </p>
    </div>
</div>
